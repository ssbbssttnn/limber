<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Limber — Library Review</title>
<style>
  :root{
    --bg:#0a0e22;--surface:#111634;--surface2:#1a2046;--border:#2a3566;
    --text:#e8ecf8;--muted:#8591bf;--accent:#ed3426;--accent2:#ff5a4d;
    --good:#34e878;--warn:#e6b143;--r:6px;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'Archivo','Helvetica Neue',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);
    background-image:linear-gradient(rgba(120,140,220,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(120,140,220,.04) 1px,transparent 1px);
    background-size:24px 24px;min-height:100vh;padding-bottom:120px}
  .wrap{max-width:560px;margin:0 auto;padding:0 16px}
  header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1.5px solid var(--accent);
    padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top));margin-bottom:18px}
  .htop{max-width:560px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase}
  .brand b{color:var(--accent)}
  .count{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .pbar{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:10px;max-width:560px;margin-left:auto;margin-right:auto}
  .pfill{height:100%;background:var(--accent);box-shadow:0 0 8px var(--accent);transition:width .3s;width:0}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;gap:8px;align-items:center}
  .photo{position:relative;width:100%;aspect-ratio:4/3;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
  .photo img{width:100%;height:100%;object-fit:contain;background:#fff}
  .ph-none{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;padding:20px;line-height:1.6}
  .ph-none .x{display:block;font-size:26px;color:var(--border);margin-bottom:8px}
  .ph-flag{position:absolute;top:8px;left:8px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;border-radius:4px;background:var(--warn);color:#1a1408;font-weight:600}
  .ph-replaced{background:var(--good);color:#04200f}
  .photo-actions{display:flex;gap:8px;margin:8px 0 18px}
  label.fl{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:16px 0 6px}
  label.fl .hint{text-transform:none;letter-spacing:0;color:var(--muted);opacity:.7}
  input.fi,textarea.fi,select.fi{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);
    font-family:var(--sans);font-size:15px;padding:11px 12px;resize:vertical;line-height:1.45}
  select.fi{font-family:var(--mono);font-size:14px}
  input.fi:focus,textarea.fi:focus,select.fi:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(237,52,38,.15)}
  .fi.changed{border-color:var(--warn)}
  textarea.fi{min-height:70px}
  .tag-grid{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-family:var(--mono);font-size:11px;padding:7px 11px;border-radius:var(--r);cursor:pointer;background:var(--surface);border:1.5px solid var(--border);color:var(--muted);transition:.12s}
  .tag.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .tag.kind.on{background:var(--surface2);border-color:var(--muted);color:var(--text)}
  .changed-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--warn);margin-left:6px;vertical-align:middle}
  .names{margin-top:2px}
  .name-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
  .name-row .txt{flex:1;font-size:14px;word-break:break-word}
  .name-row.active .txt{font-weight:700}
  .star{background:none;border:none;color:var(--accent);font-size:17px;cursor:pointer;padding:0;width:24px;flex-shrink:0}
  .badge{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);border:1px solid var(--border);border-radius:3px;padding:2px 5px}
  .name-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px 6px;flex-shrink:0}
  .name-add{display:flex;gap:8px;margin-top:8px}
  .name-add input{flex:1}
  .id-row{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:16px;word-break:break-all}
  .id-row b{color:var(--text)}
  .note label.fl{color:var(--warn)}
  .btn{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;
    border:1.5px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--r);padding:11px 14px;cursor:pointer;transition:.12s}
  .btn:active{transform:translateY(1px)}
  .btn.flex{flex:1}
  .btn.warn.on{background:var(--warn);color:#1a1408;border-color:var(--warn)}
  .btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.sm{padding:9px 12px;font-size:11px}
  .btn.ghost{background:transparent}
  .navbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1.5px solid var(--accent);
    padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));z-index:10}
  .navbar-in{max-width:560px;margin:0 auto;display:flex;gap:10px;align-items:center}
  .navbar .btn{flex:1}
  .jump{font-family:var(--mono);font-size:12px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);border-radius:var(--r);padding:11px 8px;text-align:center;width:74px}
  .flag-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .chip{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:7px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .meta-flags{display:flex;gap:6px;margin-left:auto;align-items:center}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--border)}
  .dot.edited{background:var(--warn)}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--good);color:#04200f;font-family:var(--mono);font-size:12px;
    font-weight:600;padding:10px 18px;border-radius:20px;opacity:0;transition:.3s;pointer-events:none;z-index:20}
  .toast.show{opacity:1}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="htop">
    <div class="brand">LIMBER <b>/</b> REVIEW</div>
    <div class="count"><span id="pos">1</span> / <span id="total">0</span> &nbsp;·&nbsp; <span id="touched">0</span> edited</div>
  </div>
  <div class="pbar"><div class="pfill" id="pfill"></div></div>
</header>
<div class="wrap" id="app"></div>
<div class="navbar">
  <div class="navbar-in">
    <button class="btn ghost" onclick="go(-1)">‹ Prev</button>
    <input class="jump" id="jump" type="number" min="1" inputmode="numeric" onchange="jumpTo(this.value)">
    <button class="btn ghost" onclick="go(1)">Next ›</button>
    <button class="btn accent" onclick="exportEdits()">Export</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="imgfile" accept="image/*" style="display:none">

":"mobility","equip":"","dur":30,"bilateral":false,"desc":"Slowly circle the head, dropping the chin toward the chest and around. Avoid rolling the head far back.","cues":"Move through the front range only. Slow and controlled."},{"id":"seated-neck-side","name":"Cross-Legged Lateral Neck & Biceps Stretch","parts":["Neck","Arms"],"kind":["Static hold"],"names":[],"area":"neck","sub":"","type":"static","equip":"","dur":30,"bilateral":true,"desc":"Seated tall, tilt the ear toward the shoulder. Optionally rest the hand over the head for gentle added weight.","cues":"Anchor the opposite shoulder down. Gentle, no pulling."},{"id":"overhead-triceps","name":"Overhead Triceps Stretch","parts":["Arms"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"tricep","type":"static","equip":"","dur":30,"bilateral":true,"desc":"Reach one arm overhead and bend the elbow so the hand drops behind the neck. Gently press the elbow with the other hand.","cues":"Reach the hand down the spine. Keep the head tall."},{"id":"bent-arm-chest","name":"Bent Arm Chest Stretch","parts":["Chest","Arms"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"chest","type":"static","equip":"","dur":30,"bilateral":true,"desc":"Place a bent arm against a wall or doorframe at shoulder height and turn the body away to stretch the chest and front shoulder.","cues":"Forearm flat, rotate the chest open. Switch sides."},{"id":"rear-deltoid","name":"Cross-Body Rear Delt Stretch","parts":["Shoulders"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":30,"bilateral":true,"desc":"Draw one straight arm across the body and hold it in with the opposite forearm to stretch the back of the shoulder.","cues":"Keep the arm straight and low across the chest."},{"id":"arm-up-rotator","name":"Standing Stick-Assisted Shoulder External Rotation Stretch","parts":["Shoulders"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":30,"bilateral":true,"desc":"Raise the arm out to the side, elbow bent 90\u00b0 with the hand pointing up, and gently rotate the forearm back.","cues":"Keep the elbow at shoulder height. Move slowly."},{"id":"elbows-back","name":"Elbows-Back Chest Opener","parts":["Arms","Chest"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":30,"bilateral":false,"desc":"Bend both elbows and draw them back behind you, squeezing the shoulder blades together to open the chest.","cues":"Lift the chest, pull the elbows toward each other."},{"id":"reverse-shoulder","name":"Behind-Back Chest and Shoulder Opener","parts":["Shoulders","Chest"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":30,"bilateral":false,"desc":"Clasp the hands behind the back and lift the arms gently to stretch the front of the shoulders and chest.","cues":"Roll the shoulders back, squeeze the blades together."},{"id":"above-head-chest","name":"Overhead Chest Opener","parts":["Chest"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"chest","type":"static","equip":"","dur":30,"bilateral":false,"desc":"Clasp the hands overhead with palms up and gently press back and up to open the chest and shoulders.","cues":"Lengthen up, keep the ribs from flaring."},{"id":"shoulder-circle","name":"Shoulder Rolls","parts":["Shoulders"],"kind":["Mobility drill","Dynamic warm-up"],"names":[],"area":"shoulders","sub":"","type":"mobility","equip":"","dur":25,"bilateral":false,"desc":"Roll the shoulders in slow, full circles, forward then backward.","cues":"Big slow circles. Loosen with each rotation."},{"id":"arm-crossover","name":"Cross-Body Arm Swing","parts":["Shoulders","Upper back"],"kind":["Mobility drill","Dynamic warm-up"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":30,"bilateral":false,"desc":"Bring one arm across the body and gently press it toward the chest with the other arm.","cues":"Relax the shoulder down as you draw the arm in."},{"id":"wrist-flexor","name":"Single-Arm Wrist Flexor Stretch","parts":["Wrists/forearms"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":20,"bilateral":true,"desc":"Extend one arm with the palm up and gently pull the fingers down and back with the other hand.","cues":"Feel it along the inner forearm. Keep the elbow straight."},{"id":"wrist-extensor","name":"Single-Arm Wrist Extensor Stretch","parts":["Wrists/forearms"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":20,"bilateral":true,"desc":"Extend one arm with the palm down and gently pull the fingers down and back with the other hand.","cues":"Feel it along the top of the forearm. Gentle pressure."},{"id":"wrist-circles","name":"Wrist Circles","parts":["Wrists/forearms"],"kind":["Mobility drill","Dynamic warm-up"],"names":[],"area":"shoulders","sub":"","type":"mobility","equip":"","dur":20,"bilateral":false,"desc":"Make loose fists and circle the wrists slowly in both directions.","cues":"Full slow circles each way to warm the joints."},{"id":"finger-extension","name":"Finger Extension Stretch","parts":["Wrists/forearms"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":20,"bilateral":true,"desc":"Gently draw the fingers back toward the forearm with the opposite hand, opening the palm.","cues":"Open the hand fully. Easy pressure."},{"id":"finger-flexor","name":"Finger Flexor Stretch","parts":["Wrists/forearms"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":20,"bilateral":true,"desc":"Gently curl and press the fingers in toward the palm side with the other hand.","cues":"Mild stretch across the top of the fingers and hand."},{"id":"thumb-stretch","name":"Thumb Stretch","parts":["Wrists/forearms"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":15,"bilateral":true,"desc":"Gently draw the thumb back and away from the palm with the other hand.","cues":"Very light \u2014 the thumb joint is delicate."},{"id":"cat-cow","name":"Cat-Cow","parts":["Lower back","Upper back","Hips","Glutes","Core"],"kind":["Dynamic warm-up","Mobility drill"],"names":[],"area":"back","sub":"","type":"mobility","equip":"","dur":45,"bilateral":false,"desc":"On hands and knees, alternate arching the back and dropping the belly (cow) with rounding the spine and tucking the chin (cat).","cues":"Move with the breath \u2014 inhale to arch, exhale to round."},{"id":"cat-pose","name":"Marjaryasana (Cat Pose)","parts":["Lower back","Upper back","Hips","Core"],"kind":["Static hold"],"names":[],"area":"back","sub":"","type":"static","equip":"","dur":30,"bilateral":false,"desc":"On hands and knees, round the spine toward the ceiling and tuck the chin.","cues":"Push the floor away, spread the shoulder blades."},{"id":"cow-stretch","name":"Bitilasana (Cow Pose)","parts":["Lower back","Upper back","Hips","Glutes","Core"],"kind":["Static hold"],"names":[],"area":"back","sub":"","type":"static","equip":"","dur":30,"bilateral":false,"desc":"On hands and knees, drop the belly and lift the chest and tailbone into a gentle arch.","cues":"Open the chest forward, keep the neck long."},{"id":"child-pose","name":"Balasana (Child's Pose)","parts":["Lower back"],"kind":["Static hold","Restorative"],"names":[],"area":"back","sub":"","type":"restorative","equip":"","dur":60,"bilateral":false,"desc":"Kneel and sit back on the heels, folding forward to rest the forehead down and reach the arms forward.","cues":"Let the chest melt toward the floor. Breathe into the back."},{"id":"thread-the-needle","name":"Parsva Balasana (Thread the Needle Pose)","parts":["Shoulders","Upper back"],"kind":["Static hold"],"names":[],"area":"back","sub":"","type":"static","equip":"","dur":45,"bilateral":true,"desc":"From hands and knees, slide one arm underneath the body and rest the shoulder and temple on the floor, rotating the upper back.","cues":"Let the top shoulder relax down. Switch sides."},{"id":"cobra","name":"Bhujangasana (Cobra Pose)","parts":["Lower back"],"kind":["Static hold","Mobility drill","Dynamic warm-up","Strengthening"],"names":[],"area":"back","sub":"","type":"static","equip":"","dur":30,"bilateral":false,"desc":"Lie face down and press through the hands to lift the chest, keeping the hips on the floor.","cues":"Shoulders down and back. Lead with the chest, not the chin."},{"id":"sphinx","name":"Salamba Bhujangasana (Sphinx Pose)","parts":["Lower back","Upper back"],"kind":["Static hold"],"names":[],"area":"back","sub":"","type":"static","equip":"","dur":60,"bilateral":false,"desc":"Lie face down and prop onto the forearms with elbows under the shoulders, lifting the chest into a gentle backbend.","cues":"Relax the glutes. Long, easy backbend."},{"id":"upward-dog","name":"Upward-Facing Dog","parts":["Upper back","Lower back"],"kind":["Static hold"],"names":[],"area":"back","sub":"","type":"static","equip":"","dur":30,"bilateral":false,"desc":"From face down, press through the hands and tops of the feet to lift the chest and thighs off the floor.","cues":"Press down to lift up. Shoulders away from the ears."},{"id":"puppy-pose","name":"Puppy Pose","parts":["Shoulders","Neck"],"kind":["Static hold"],"names":[],"area":"back","sub":"","type":"static","equip":"","dur":60,"bilateral":false,"desc":"From hands and knees, walk the hands forward and melt the chest toward the floor, hips staying over the knees.","cues":"Keep the hips high, let the heart sink down."},{"id":"supine-twist","name":"Supta Matsyendrasana (Supine Spinal Twist)","parts":["Upper back","Lower back","Chest"],"kind":["Static hold"],"names":[],"area":"back","sub":"","type":"static","equip":"","dur":45,"bilateral":true,"desc":"Lying on the back, draw one knee across the body toward the floor while keeping both shoulders down.","cues":"Gaze away from the knee. L ee and rotate the hip open and closed.","cues":"Controlled circles. Use support if needed. Switch sides."},{"id":"heel-press","name":"Single Leg Calf Stretch (Wall)","parts":["Calves"],"kind":["Static hold"],"names":[],"area":"legs","sub":"","type":"static","equip":"","dur":30,"bilateral":true,"desc":"Press one heel down and back to stretch the calf, like a standing calf stretch.","cues":"Keep the leg straight, heel grounded. Switch sides."},{"id":"standing-toe-up-calf","name":"Single Leg Calf Stretch (Step)","parts":["Calves"],"kind":["Static hold"],"names":[],"area":"legs","sub":"calf","type":"static","equip":"","dur":30,"bilateral":true,"desc":"Place the toes up against a wall or step with the heel down and lean in to stretch the calf.","cues":"Keep the leg straight. Switch sides."},{"id":"rollover","name":"Rollover","parts":["Core","Quads"],"kind":["Dynamic warm-up","Strengthening"],"names":[],"area":"back","sub":"","type":"dynamic","equip":"","dur":35,"bilateral":false,"desc":"On the back, roll the legs up and overhead, then back down with control.","cues":"Move slowly and protect the neck."},{"id":"seated-shoulder-flexor-depressor-retractor","name":"Floor Chest and Shoulder Opener","parts":["Shoulders","Chest"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":30,"bilateral":false,"desc":"Sit with one knee bent and the other extended. Reach both arms forward at shoulder height, clasp the hands, round the upper back, and drop the head between the arms.","cues":"Reach the hands forward as you round through the upper back. Feel it across the rear shoulders and upper back."},{"id":"twist-step","name":"Twist Step Stretch","parts":["Upper back"],"kind":["Dynamic warm-up"],"names":[],"area":"core","sub":"","type":"dynamic","equip":"","dur":30,"bilateral":true,"desc":"Step and rotate the torso, combining a gentle lunge with a twist.","cues":"Rotate toward the front leg. Switch sides."},{"id":"bent-over-twist","name":"Bent-Over Twist","parts":["Upper back","Lower back"],"kind":["Dynamic warm-up","Mobility drill"],"names":[],"area":"back","sub":"","type":"dynamic","equip":"","dur":35,"bilateral":true,"desc":"Hinge forward and rotate the torso, reaching one hand toward the opposite foot.","cues":"Reach down and across, then switch. Switch sides."},{"id":"standing-wring-towel","name":"Wring-the-Towel Twist","parts":["Neck","Shoulders","Arms"],"kind":["Mobility drill","Nerve floss"],"names":[],"area":"shoulders","sub":"","type":"mobility","equip":"","dur":30,"bilateral":true,"desc":"Extend the arms and rotate them in opposite directions, like wringing a towel.","cues":"Rotate from the shoulders. Switch directions."},{"id":"standing-hip-openers","name":"Standing Hip Openers","parts":["Hips"],"kind":["Dynamic warm-up","Mobility drill"],"names":[],"area":"hips","sub":"","type":"dynamic","equip":"","dur":30,"bilateral":true,"desc":"Stand on one leg, lift the other knee and circle it open and out, opening the hip.","cues":"Slow controlled circles. Open the hip out. Switch legs."},{"id":"elephant-walks","name":"Elephant Walks","parts":["Hamstrings","Glutes","Lower back","Upper back"],"kind":["Dynamic warm-up","Mobility drill"],"names":[],"area":"legs","sub":"","type":"dynamic","equip":"","dur":30,"bilateral":false,"desc":"Hinge into a forward fold with hands on the floor, then alternately bend and straighten each knee, walking it out.","cues":"Bend one knee while straightening the other. Keep it flowing."},{"id":"windshield-wipers","name":"Windshield Wipers","parts":["Hips"],"kind":["Mobility drill","Dynamic warm-up"],"names":[],"area":"hips","sub":"","type":"mobility","equip":"","dur":30,"bilateral":false,"desc":"Seated or lying with knees bent, drop both knees side to side like windshield wipers to rotate the hips and lower back.","cues":"Smooth side to side. Let the hips rotate."},{"id":"scapular-pushups","name":"Scapular Push-Ups","parts":["Shoulders","Upper back"],"kind":["Dynamic warm-up","Mobility drill"],"names":[],"area":"shoulders","sub":"","type":"dynamic","equip":"","dur":30,"bilateral":false,"desc":"In a plank or against a wall, keep the arms straight and push the shoulder blades apart, then squeeze them together.","cues":"Arms stay straight \u2014 move only the shoulder blades."},{"id":"windmills","name":"Windmills","parts":["Lower back","Core","Glutes"],"kind":["Dynamic warm-up","Strengthening","Mobility drill"],"names":[],"area":"back","sub":"","type":"dynamic","equip":"","dur":30,"bilateral":false,"desc":"Stand wide, hinge forward, and rotate to reach one hand toward the opposite foot while the other reaches up, alternating sides.","cues":"Reach one hand down, the other up. Alternate with control."},{"id":"scorpion","name":"Scorpion Stretch","parts":["Lower back","Chest"],"kind":["Static hold"],"names":[],"area":"back","sub":"","type":"dynamic","equip":"","dur":30,"bilateral":true,"desc":"Lie face down with arms out wide. Lift one leg and reach the foot across the body toward the opposite hand, rotating the lower spine and hip.","cues":"Keep the chest down. Rotate gently \u2014 don\\u2019t force the reach. Switch sides."},{"id":"reverse-prayer","name":"Reverse Prayer","parts":["Wrists/forearms","Shoulders","Chest"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":30,"bilateral":false,"desc":"Bring the palms together behind the back, fingers pointing up, and gently press them flat to stretch the wrists, forearms and chest.","cues":"Draw the elbows back and lift the chest. Ease into it \u2014 wrists are delicate."},{"id":"cow-face","name":"Gomukhasana (Cow Face Pose)","parts":["Arms","Shoulders"],"kind":["Static hold"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"","dur":30,"bilateral":true,"desc":"Reach one arm overhead and bend it down the back, and the other arm behind and up the back, trying to clasp the hands between the shoulder blades.","cues":"Use a strap if the hands don\\u2019t meet. Keep the top elbow pointing up. Switch sides."},{"id":"dead-hang","name":"Dead Hang","parts":["Full body"],"kind":["Static hold","Strengthening"],"names":[],"area":"shoulders","sub":"","type":"static","equip":"bar","dur":30,"bilateral":false,"desc":"Hang from a bar with both hands, arms straight, letting the body relax to decompress the spine and stretch the shoulders and lats.","cues":"Relax the shoulders and let gravity lengthen you. Keep a light grip-aware hold."}];
const PARTS = ["Neck", "Shoulders", "Chest", "Upper back", "Lower back", "Arms", "Wrists/forearms", "Core", "Glutes", "Hips", "Hamstrings", "Quads", "Adductors", "Calves", "Ankles", "Full body"];
const KINDS = ["Static hold", "Mobility drill", "Dynamic warm-up", "Strengthening", "Nerve floss", "Restorative"];
const LS = 'limber-review-v3';
let edits = {};
try{ edits = JSON.parse(localStorage.getItem(LS)||'{}'); }catch(e){ edits={}; }
let idx = +(localStorage.getItem(LS+'-pos')||0);
if(idx>=LIB.length) idx=0;
const EXTS=['jpg','png','jpeg','webp'];

function saveState(){ try{ localStorage.setItem(LS,JSON.stringify(edits)); localStorage.setItem(LS+'-pos',idx); }catch(e){} }
function entry(id){ return edits[id] || (edits[id]={}); }
function clean(id){ const e=edits[id]; if(e&&!Object.keys(e).length) delete edits[id]; }
function isTouched(id){ const e=edits[id]; return e && Object.keys(e).length>0; }

// effective value = my edit if present, else original snapshot value
function val(s,key){ const e=edits[s.id]||{}; return (e[key]!==undefined)?e[key]:s[key]; }
function curParts(s){ const e=edits[s.id]||{}; return (e.parts!==undefined)?e.parts:(s.parts||[]); }
function asArr(v){ return Array.isArray(v)?v:(v?[v]:[]); }
function curKind(s){ const e=edits[s.id]||{}; return asArr((e.kind!==undefined)?e.kind:s.kind); }
function curBil(s){ const e=edits[s.id]||{}; return (e.bilateral!==undefined)?e.bilateral:!!s.bilateral; }
function curNames(s){ const e=edits[s.id]||{}; const base=(e.names!==undefined)?e.names:(s.names||[]); const active=val(s,'name'); const arr=base.slice(); if(active&&!arr.includes(active))arr.unshift(active); return arr; }

function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function imgEl(id){
  const e=edits[id]||{};
  if(e.photo){ return '<img src="'+e.photo+'">'; }
  return '<img src="photos/'+id+'.jpg" data-ix="0" onerror="imgErr(this,\''+id+'\')">';
}
window.imgErr=function(el,id){
  let ix=+(el.getAttribute('data-ix')||0)+1;
  if(ix<EXTS.length){ el.setAttribute('data-ix',ix); el.src='photos/'+id+'.'+EXTS[ix]; return; }
  el.parentElement.innerHTML='<div class="ph-none"><span class="x">⊘</span>no photo at photos/'+id+'.jpg<br><span style="color:var(--warn)">run fetch, or upload below</span></div>';
};

function field(id,key,orig,label,multiline,hint){
  const e=edits[id]||{};
  const v=(e[key]!==undefined)?e[key]:(orig||'');
  const ch=(e[key]!==undefined&&e[key]!==(orig||''))?' changed':'';
  const lab='<label class="fl">'+label+(hint?' <span class="hint">'+hint+'</span>':'')+'</label>';
  if(multiline) return lab+'<textarea class="fi'+ch+'" oninput="onEdit(\''+id+'\',\''+key+'\',this.value)">'+esc(v)+'</textarea>';
  return lab+'<input class="fi'+ch+'" value="'+esc(v)+'" oninput="onEdit(\''+id+'\',\''+key+'\',this.value)">';
}

function render(scrollTop){
  const s=LIB[idx];
  const e=edits[s.id]||{};
  document.getElementById('total').textContent=LIB.length;
  document.getElementById('pos').textContent=idx+1;
  document.getElementById('jump').value=idx+1;
  document.getElementById('pfill').style.width=((idx+1)/LIB.length*100)+'%';
  document.getElementById('touched').textContent=Object.keys(edits).filter(isTouched).length;

  let photoTag;
  if(e.photo) photoTag='<div class="photo"><span class="ph-flag ph-replaced">new photo</span>'+imgEl(s.id)+'</div>';
  else if(e.photoFlag) photoTag='<div class="photo"><span class="ph-flag">flagged: '+e.photoFlag+'</span>'+imgEl(s.id)+'</div>';
  else photoTag='<div class="photo">'+imgEl(s.id)+'</div>';

  const parts=curParts(s);
  const kinds=curKind(s);
  const bil=curBil(s);
  const partsChanged=(e.parts!==undefined);
  const kindChanged=(e.kind!==undefined);
  const bilChanged=(e.bilateral!==undefined&&e.bilateral!==!!s.bilateral);

  const partTags=PARTS.map(p=>'<button class="tag'+(parts.indexOf(p)>=0?' on':'')+'" onclick="togglePart(\''+s.id+'\',\''+p.replace(/'/g,"\\'")+'\')">'+p+'</button>').join('');
  const kindTags=KINDS.map(k=>'<button class="tag kind'+(kinds.indexOf(k)>=0?' on':'')+'" onclick="toggleKind(\''+s.id+'\',\''+k.replace(/'/g,"\\'")+'\')">'+k+'</button>').join('');

  const names=curNames(s);
  const active=val(s,'name');
  const nameRows=names.map(n=>{
    const isA=(n===active);
    return '<div class="name-row'+(isA?' active':'')+'">'+
      (isA?'<button class="star" disabled>★</button>':'<button class="star" title="make active" onclick="setActive(\''+s.id+'\',\''+esc(n).replace(/'/g,"\\'")+'\')">☆</button>')+
      '<span class="txt">'+esc(n)+'</span>'+
      (isA?'<span class="badge">active</span>':'<button class="name-x" onclick="removeName(\''+s.id+'\',\''+esc(n).replace(/'/g,"\\'")+'\')">✕</button>')+
    '</div>';
  }).join('');

  document.getElementById('app').innerHTML=
    '<div class="eyebrow"><span>'+(idx+1)+' of '+LIB.length+'</span>'+
      '<span class="meta-flags">'+(isTouched(s.id)?'<span class="dot edited"></span> edited':'<span class="dot"></span>')+'</span></div>'+
    photoTag+
    '<div class="photo-actions">'+
      '<button class="btn flex" onclick="pickPhoto(\''+s.id+'\')">⬆ Replace</button>'+
      '<button class="btn warn flex'+(e.photoFlag==='wrong'?' on':'')+'" onclick="flagPhoto(\''+s.id+'\',\'wrong\')">Flag wrong</button>'+
      '<button class="btn warn flex'+(e.photoFlag==='missing'?' on':'')+'" onclick="flagPhoto(\''+s.id+'\',\'missing\')">Flag missing</button>'+
    '</div>'+
    field(s.id,'name',s.name,'Active name')+
    '<label class="fl">Other names '+(curNames(s).length>1?'':'<span class="hint">none yet — add below</span>')+'</label><div class="names">'+nameRows+
      '<div class="name-add"><input class="fi" id="newname" placeholder="add another name…" onkeydown="if(event.key===\'Enter\'){event.preventDefault();addName(\''+s.id+'\')}"><button class="btn sm" onclick="addName(\''+s.id+'\')">add</button></div></div>'+
    '<label class="fl">Body parts '+(partsChanged?'<span class="changed-dot"></span>':'')+'<span class="hint"> — tap to toggle (multiple ok)</span></label><div class="tag-grid">'+partTags+'</div>'+
    '<label class="fl">Type '+(kindChanged?'<span class="changed-dot"></span>':'')+'<span class="hint"> — tap to toggle (multiple ok)</span></label><div class="tag-grid">'+kindTags+'</div>'+
    '<label class="fl">Switch sides? '+(bilChanged?'<span class="changed-dot"></span>':'')+'<span class="hint"> — does this stretch get done on both sides?</span></label>'+
    '<div class="tag-grid"><button class="tag'+(bil?' on':'')+'" onclick="toggleBil(\''+s.id+'\')">'+(bil?'✓ Yes — both sides':'No — single position')+'</button></div>'+
    field(s.id,'desc',s.desc,'Description',true)+
    field(s.id,'cues',s.cues||'','Cues',true)+
    '<div class="note">'+field(s.id,'note','','Note','true','— anything else that feels wrong')+'</div>'+
    '<div class="flag-bar"><button class="chip'+(e.remove?' on':'')+'" onclick="toggleRemove(\''+s.id+'\')">'+(e.remove?'✓ marked for removal':'mark for removal')+'</button>'+
      (isTouched(s.id)?'<button class="chip" onclick="clearOne(\''+s.id+'\')">clear edits</button>':'')+'</div>'+
    '<div class="id-row">id: <b>'+s.id+'</b> · photo: <b>photos/'+s.id+'.jpg</b></div>';
  if(scrollTop)window.scrollTo(0,0);
}

window.onEdit=function(id,key,v){
  const e=entry(id); const orig=LIB[idx][key]||'';
  if(key==='note'){ if(v)e.note=v; else delete e.note; }
  else if(v===orig){ delete e[key]; }
  else e[key]=v;
  clean(id); saveState();
  document.getElementById('touched').textContent=Object.keys(edits).filter(isTouched).length;
};
window.togglePart=function(id,p){
  const s=LIB[idx]; const cur=curParts(s).slice();
  const i=cur.indexOf(p); if(i>=0)cur.splice(i,1); else cur.push(p);
  const e=entry(id);
  // store as edit only if differs from snapshot
  if(JSON.stringify(cur.slice().sort())===JSON.stringify((s.parts||[]).slice().sort())) delete e.parts; else e.parts=cur;
  clean(id); saveState(); render();
};
window.toggleKind=function(id,k){
  const s=LIB[idx]; const cur=curKind(s).slice();
  const i=cur.indexOf(k); if(i>=0)cur.splice(i,1); else cur.push(k);
  const e=entry(id);
  const orig=asArr(s.kind);
  if(JSON.stringify(cur.slice().sort())===JSON.stringify(orig.slice().sort())) delete e.kind; else e.kind=cur;
  clean(id); saveState(); render();
};
window.toggleBil=function(id){
  const s=LIB[idx]; const nv=!curBil(s); const e=entry(id);
  if(nv===!!s.bilateral) delete e.bilateral; else e.bilateral=nv;
  clean(id); saveState(); render();
};
window.addName=function(id){
  const inp=document.getElementById('newname'); const v=(inp.value||'').trim(); if(!v)return;
  const s=LIB[idx]; const base=(edits[id]&&edits[id].names!==undefined)?edits[id].names.slice():(s.names||[]).slice();
  if(!base.includes(v)&&v!==val(s,'name')) base.push(v);
  entry(id).names=base; clean(id); saveState(); render();
};
window.removeName=function(id,n){
  const s=LIB[idx]; const base=(edits[id]&&edits[id].names!==undefined)?edits[id].names.slice():(s.names||[]).slice();
  const nb=base.filter(x=>x!==n);
  if(JSON.stringify(nb)===JSON.stringify(s.names||[])) delete entry(id).names; else entry(id).names=nb;
  clean(id); saveState(); render();
};
window.setActive=function(id,n){
  const s=LIB[idx];
  // make n active: set name edit, and ensure old active is preserved in names list
  const e=entry(id);
  const oldActive=val(s,'name');
  let base=(e.names!==undefined)?e.names.slice():(s.names||[]).slice();
  if(oldActive&&!base.includes(oldActive)) base.push(oldActive);
  base=base.filter(x=>x!==n);
  if(n!==s.name) e.name=n; else delete e.name;
  if(JSON.stringify(base)===JSON.stringify(s.names||[])) delete e.names; else e.names=base;
  clean(id); saveState(); render();
};
window.flagPhoto=function(id,kind){
  const e=entry(id); e.photoFlag=(e.photoFlag===kind)?undefined:kind;
  if(!e.photoFlag)delete e.photoFlag; clean(id); saveState(); render();
};
window.toggleRemove=function(id){ const e=entry(id); e.remove=!e.remove; if(!e.remove)delete e.remove; clean(id); saveState(); render(); };
window.clearOne=function(id){ delete edits[id]; saveState(); render(); toast('Edits cleared'); };
window.pickPhoto=function(id){
  const inp=document.getElementById('imgfile');
  inp.onchange=function(){
    const f=inp.files[0]; if(!f)return;
    const img=new Image(); const rd=new FileReader();
    rd.onload=function(ev){ img.onload=function(){
      const max=800; let w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
      const c=document.createElement('canvas'); c.width=w;c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
      entry(id).photo=c.toDataURL('image/jpeg',0.82); saveState(); render(); toast('Photo attached (downscaled)');
    }; img.src=ev.target.result; };
    rd.readAsDataURL(f); inp.value='';
  };
  inp.click();
};
function go(d){ idx=Math.max(0,Math.min(LIB.length-1,idx+d)); saveState(); render(true); }
window.jumpTo=function(v){ const n=parseInt(v,10); if(n>=1&&n<=LIB.length){ idx=n-1; saveState(); render(true); } };
let toastT; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1600); }
window.exportEdits=function(){
  const out={generated:new Date().toISOString(),app:'limber-review',version:2,count:Object.keys(edits).filter(isTouched).length,edits:{}};
  Object.keys(edits).forEach(id=>{ if(isTouched(id)) out.edits[id]=edits[id]; });
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='limber-review-edits.json'; a.click();
  toast(out.count+' edits exported');
};
document.addEventListener('keydown',e=>{ if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return; if(e.key==='ArrowRight')go(1); if(e.key==='ArrowLeft')go(-1); });
render(true);
</script>
