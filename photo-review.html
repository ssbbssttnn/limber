<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Limber — Photo Review</title>
<style>
  :root{--bg:#0a0e22;--surface:#111634;--surface2:#1a2046;--border:#2a3566;
    --text:#e8ecf8;--muted:#8591bf;--accent:#ed3426;--accent2:#ff5a4d;
    --good:#34e878;--warn:#e6b143;--danger:#ff4d4d;--r:6px;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'Archivo','Helvetica Neue',system-ui,sans-serif;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);
    background-image:linear-gradient(rgba(120,140,220,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(120,140,220,.04) 1px,transparent 1px);
    background-size:24px 24px;min-height:100vh;padding-bottom:130px}
  .wrap{max-width:620px;margin:0 auto;padding:0 16px}
  header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1.5px solid var(--accent);
    padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top))}
  .htop{max-width:620px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase}
  .brand b{color:var(--accent)}
  .count{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .filters{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px;max-width:620px;margin-left:auto;margin-right:auto}
  .chip{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:7px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip .n{opacity:.7;margin-left:4px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
  @media(max-width:480px){.grid{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column}
  .card.removing{border-color:var(--danger);opacity:.65}
  .card.assigned{border-color:var(--good)}
  .ph{position:relative;width:100%;aspect-ratio:4/3;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .ph img{width:100%;height:100%;object-fit:contain;background:#fff}
  .ph-none{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;padding:14px;line-height:1.5}
  .ph-none .x{display:block;font-size:22px;color:var(--border);margin-bottom:6px}
  .flag{position:absolute;top:6px;left:6px;font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:3px 7px;border-radius:4px;font-weight:600}
  .flag.new{background:var(--good);color:#04200f}
  .flag.rm{background:var(--danger);color:#fff}
  .meta{padding:9px 10px 11px}
  .nm{font-size:13px;font-weight:600;line-height:1.25;margin-bottom:2px}
  .id{font-family:var(--mono);font-size:9.5px;color:var(--muted);word-break:break-all;margin-bottom:9px}
  .acts{display:flex;gap:6px}
  .btn{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;
    border:1.5px solid var(--border);background:var(--surface2);color:var(--text);border-radius:5px;padding:8px 9px;cursor:pointer;transition:.12s;flex:1;text-align:center}
  .btn:active{transform:translateY(1px)}
  .btn.up{border-color:var(--accent);color:var(--accent2)}
  .btn.undo{flex:0 0 auto;border-color:var(--border);color:var(--muted);padding:8px 10px}
  .btn.wide{width:100%;margin-top:6px}
  .btn.rm.on{background:var(--good);border-color:var(--good);color:#04200f}
  .btn.rm{border-color:var(--danger);color:var(--danger);background:transparent}
  .navbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1.5px solid var(--accent);
    padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));z-index:10}
  .navbar-in{max-width:620px;margin:0 auto;display:flex;gap:10px;align-items:center}
  .navbar .btn{flex:1;font-size:12px;padding:13px}
  .btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
  .summary{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;margin-top:10px}
  .summary b{color:var(--good)}
  .summary .r{color:var(--danger)}
  .search{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);
    font-family:var(--sans);font-size:15px;padding:10px 12px;margin-top:11px}
  .search:focus{outline:none;border-color:var(--accent)}
</style>
</head>

  <div class="htop">
    <div class="brand"><b>//</b> limber · photo review</div>

</div>
<div class="summary" id="summary"></div></div>

<input type="file" id="filepick" accept="image/*" style="display:none">

retch","area":"legs"},{"id":"one-arm-lat","name":"One Arm Lat Stretch","area":"back"},{"id":"side-lat","name":"Side Lat Stretch","area":"back"},{"id":"reverse-chest","name":"Bench Chest and Shoulder Stretch","area":"shoulders"},{"id":"superman-chest","name":"Superman","area":"back"},{"id":"seated-sky-look","name":"Cross-Legged Sky Gaze","area":"neck"},{"id":"kneeling-wrist-flexor","name":"Kneeling Wrist Flexor Stretch","area":"shoulders"},{"id":"prayer-squat","name":"Malasana (Prayer Squat)","area":"hips"},{"id":"crocodile","name":"Makarasana (Crocodile Pose)","area":"back"},{"id":"animal-resting","name":"Saithalyasana (Animal Resting Pose)","area":"hips"},{"id":"standing-figure-four","name":"Eka Pada Utkatasana (Standing Figure Four)","area":"hips"},{"id":"standing-balance-hip-rotation","name":"Standing Hip Rotations","area":"hips"},{"id":"heel-press","name":"Single Leg Calf Stretch (Wall)","area":"legs"},{"id":"standing-toe-up-calf","name":"Single Leg Calf Stretch (Step)","area":"legs"},{"id":"rollover","name":"Rollover","area":"back"},{"id":"seated-shoulder-flexor-depressor-retractor","name":"Floor Chest and Shoulder Opener","area":"shoulders"},{"id":"twist-step","name":"Twist Step Stretch","area":"core"},{"id":"bent-over-twist","name":"Bent-Over Twist","area":"back"},{"id":"standing-wring-towel","name":"Wring-the-Towel Twist","area":"shoulders"},{"id":"standing-hip-openers","name":"Standing Hip Openers","area":"hips"},{"id":"elephant-walks","name":"Elephant Walks","area":"legs"},{"id":"windshield-wipers","name":"Windshield Wipers","area":"hips"},{"id":"scapular-pushups","name":"Scapular Push-Ups","area":"shoulders"},{"id":"windmills","name":"Windmills","area":"back"},{"id":"scorpion","name":"Scorpion Stretch","area":"back"},{"id":"reverse-prayer","name":"Reverse Prayer","area":"shoulders"},{"id":"cow-face","name":"Gomukhasana (Cow Face Pose)","area":"shoulders"},{"id":"dead-hang","name":"Dead Hang","area":"shoulders"}];
const EXTS=['jpg','jpeg','png','webp','JPG','JPEG','PNG'];
// state: assigned[id] = {dataUrl, blob}; removals = Set; existing[id]=true if repo photo found
const assigned={}, removals=new Set(), existing={};
let filter='all', activeUpload=null;

// detect existing repo photos by attempting to load photos/{id}.jpg etc
function probe(id){
  return new Promise(res=>{
    let i=0;
    const tryNext=()=>{
      if(i>=EXTS.length){res(false);return;}
      const img=new Image();
      img.onload=()=>res('photos/'+id+'.'+EXTS[i]);
      img.onerror=()=>{i++;tryNext();};
      img.src='photos/'+id+'.'+EXTS[i]+'?t='+Date.now();
    };
    tryNext();
  });
}

async function detectExisting(){
  // probe in small batches to avoid hammering
  for(let i=0;i<STRETCHES.length;i+=12){
    const batch=STRETCHES.slice(i,i+12);
    await Promise.all(batch.map(async s=>{const r=await probe(s.id);if(r)existing[s.id]=r;}));
    render();
  }
}

const FILTERS=[
  ['all','All'],['missing','Missing'],['has','Has photo'],
  ['assigned','New uploads'],['removing','Marked remove']
];
function renderFilters(){
  const counts={all:STRETCHES.length,
    missing:STRETCHES.filter(s=>!existing[s.id]&&!assigned[s.id]).length,
    has:STRETCHES.filter(s=>existing[s.id]||assigned[s.id]).length,
    assigned:Object.keys(assigned).length,
    removing:removals.size};
  document.getElementById('filters').innerHTML=FILTERS.map(([k,l])=>
    `<div class="chip ${filter===k?'on':''}" onclick="setFilter('${k}')">${l}<span class="n">${counts[k]}</span></div>`).join('');
}
function setFilter(f){filter=f;render();}

function matchFilter(s){
  const has=existing[s.id]||assigned[s.id];
  if(filter==='missing')return !has;
  if(filter==='has')return !!has;
  if(filter==='assigned')return !!assigned[s.id];
  if(filter==='removing')return removals.has(s.id);
  return true;
}

function render(){
  renderFilters();
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  const items=STRETCHES.filter(s=>matchFilter(s)&&(!q||s.name.toLowerCase().includes(q)||s.id.includes(q)));
  document.getElementById('count').textContent=items.length+' / '+STRETCHES.length;
  document.getElementById('grid').innerHTML=items.map(s=>{
    const up=assigned[s.id], ex=existing[s.id], rm=removals.has(s.id);
    const src=up?up.dataUrl:(ex||null);
    return `<div class="card ${rm?'removing':''} ${up?'assigned':''}">
      <div class="ph">
        ${src?`<img src="${src}">`:'<div class="ph-none"><span class="x">⊘</span>no photo</div>'}
        ${up?'<div class="flag new">new photo</div>':''}
        ${rm?'<div class="flag rm">exercise flagged</div>':''}
      </div>
      <div class="meta">
        <div class="nm">${s.name}</div>
        <div class="id">${s.id}.jpg</div>
        <div class="acts">
          <button class="btn up" onclick="pick('${s.id}')">${src?'Replace photo':'Add photo'}</button>
          ${up?`<button class="btn undo" onclick="undoUpload('${s.id}')" title="Discard this upload">✕ photo</button>`:''}
        </div>
        <button class="btn rm wide ${rm?'on':''}" onclick="toggleRm('${s.id}')">${rm?'✓ Keep exercise':'Remove exercise'}</button>
      </div>
    </div>`;
  }).join('');
  updateSummary();
}

function updateSummary(){
  const a=Object.keys(assigned).length, r=removals.size;
  document.getElementById('summary').innerHTML=
    `<b>${a}</b> photo${a===1?'':'s'} to export · <span class="r">${r}</span> marked for removal`;
}

function pick(id){activeUpload=id;document.getElementById('filepick').click();}
function toggleRm(id){removals.has(id)?removals.delete(id):removals.add(id);dbSaveRemovals();render();}
function undoUpload(id){delete assigned[id];dbDelPhoto(id);render();}

document.getElementById('filepick').addEventListener('change',async e=>{
  const f=e.target.files[0]; if(!f||!activeUpload)return;
  const id=activeUpload; activeUpload=null; e.target.value='';
  const {dataUrl,blob}=await processImage(f);
  assigned[id]={dataUrl,blob};
  dbSetPhoto(id,blob,dataUrl);
  render();
});

// resize to max 800px long edge, JPEG q0.82
function processImage(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800; let {width:w,height:h}=img;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      else if(h>=w&&h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      const ctx=c.getContext('2d');
      ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      c.toBlob(blob=>{
        const r=new FileReader();r.onload=()=>res({dataUrl:r.result,blob});r.readAsDataURL(blob);
      },'image/jpeg',0.82);
    };
    img.onerror=rej;
    img.src=URL.createObjectURL(file);
  });
}

async function exportZip(){
  const ids=Object.keys(assigned);
  if(!ids.length){alert('No photos uploaded yet. Tap Upload on a stretch first.');return;}
  const zip=new JSZip();
  const folder=zip.folder('photos');
  for(const id of ids){folder.file(id+'.jpg',assigned[id].blob);}
  // include a manifest
  folder.file('_manifest.txt','Limber photo export\n'+ids.length+' files\n\n'+ids.map(i=>i+'.jpg').join('\n'));
  const blob=await zip.generateAsync({type:'blob'});
  dl(blob,'limber-photos.zip');
}

function exportRemovals(){
  if(!removals.size){alert('Nothing marked for removal.');return;}
  const names={};STRETCHES.forEach(s=>names[s.id]=s.name);
  const txt='Limber — stretches marked for removal\n'+removals.size+' total\n\n'+
    [...removals].map(id=>id+'  ('+names[id]+')').join('\n');
  dl(new Blob([txt],{type:'text/plain'}),'limber-removals.txt');
}

function dl(blob,name){
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();a.remove();
}

// ── persistence: survive refresh/close via IndexedDB ──
let _db=null;
function db(){
  if(_db)return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const r=indexedDB.open('limber-photo-review',1);
    r.onupgradeneeded=()=>{const d=r.result;if(!d.objectStoreNames.contains('photos'))d.createObjectStore('photos');if(!d.objectStoreNames.contains('meta'))d.createObjectStore('meta');};
    r.onsuccess=()=>{_db=r.result;res(_db);};
    r.onerror=()=>rej(r.error);
  });
}
async function dbSetPhoto(id,blob,dataUrl){
  const d=await db();return new Promise((res,rej)=>{const tx=d.transaction('photos','readwrite');tx.objectStore('photos').put({blob,dataUrl},id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});
}
async function dbDelPhoto(id){
  const d=await db();return new Promise((res,rej)=>{const tx=d.transaction('photos','readwrite');tx.objectStore('photos').delete(id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});
}
async function dbAllPhotos(){
  const d=await db();return new Promise((res,rej)=>{const out={};const tx=d.transaction('photos','readonly');const st=tx.objectStore('photos');const cur=st.openCursor();cur.onsuccess=e=>{const c=e.target.result;if(c){out[c.key]=c.value;c.continue();}else res(out);};cur.onerror=()=>rej(cur.error);});
}
async function dbSaveRemovals(){
  const d=await db();return new Promise((res,rej)=>{const tx=d.transaction('meta','readwrite');tx.objectStore('meta').put([...removals],'removals');tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});
}
async function dbLoadRemovals(){
  const d=await db();return new Promise((res)=>{const tx=d.transaction('meta','readonly');const rq=tx.objectStore('meta').get('removals');rq.onsuccess=()=>res(rq.result||[]);rq.onerror=()=>res([]);});
}
async function loadSaved(){
  try{
    const photos=await dbAllPhotos();
    for(const id in photos){assigned[id]={dataUrl:photos[id].dataUrl,blob:photos[id].blob};}
    const rm=await dbLoadRemovals();rm.forEach(id=>removals.add(id));
    render();
  }catch(e){console.warn('load failed',e);}
}
async function clearAll(){
  if(!confirm('Clear all uploaded photos and removal marks from this tool? (Your repo files are not affected.)'))return;
  for(const id in assigned)delete assigned[id];
  removals.clear();
  try{const d=await db();await new Promise(r=>{const tx=d.transaction(['photos','meta'],'readwrite');tx.objectStore('photos').clear();tx.objectStore('meta').clear();tx.oncomplete=r;});}catch(e){}
  render();
}

render();
loadSaved();
detectExisting();
</script>
