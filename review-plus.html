<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Limber — Library Review+</title>
<style>
  :root{--bg:#0a0e22;--surface:#111634;--surface2:#1a2046;--border:#2a3566;
    --text:#e8ecf8;--muted:#8591bf;--accent:#ed3426;--accent2:#ff5a4d;
    --good:#34e878;--warn:#e6b143;--danger:#ff4d4d;--r:6px;
    --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;--sans:'Archivo','Helvetica Neue',system-ui,sans-serif;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);
    background-image:linear-gradient(rgba(120,140,220,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(120,140,220,.04) 1px,transparent 1px);
    background-size:24px 24px;min-height:100vh;padding-bottom:120px}
  .wrap{max-width:600px;margin:0 auto;padding:0 16px}
  header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1.5px solid var(--accent);padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top))}
  .htop{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase}
  .brand b{color:var(--accent)}
  .count{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .search{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:15px;padding:10px 12px;margin-top:11px}
  .search:focus{outline:none;border-color:var(--accent)}
  .filters{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px;max-width:600px;margin-left:auto;margin-right:auto}
  .chip{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:7px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip .n{opacity:.7;margin-left:4px}
  /* grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
  @media(max-width:480px){.grid{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:.12s}
  .card:active{transform:scale(.98)}
  .card.edited{border-color:var(--warn)}
  .card.removing{border-color:var(--danger);opacity:.6}
  .card.newphoto{border-color:var(--good)}
  .cph{position:relative;width:100%;aspect-ratio:4/3;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .cph img{width:100%;height:100%;object-fit:contain;background:#fff}
  .cph-none{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center}
  .cph-none .x{display:block;font-size:20px;color:var(--border);margin-bottom:4px}
  .cflag{position:absolute;top:5px;left:5px;font-family:var(--mono);font-size:8px;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:3px;font-weight:600}
  .cflag.e{background:var(--warn);color:#1a1408}
  .cflag.p{background:var(--good);color:#04200f}
  .cflag.r{background:var(--danger);color:#fff;left:auto;right:5px}
  .cmeta{padding:8px 9px}
  .cnm{font-size:12.5px;font-weight:600;line-height:1.25}
  .cid{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:3px;word-break:break-all}
  /* editor overlay */
  .editor{position:fixed;inset:0;z-index:50;background:var(--bg);overflow-y:auto;display:none}
  .editor.open{display:block}
  .ed-head{position:sticky;top:0;background:var(--bg);border-bottom:1.5px solid var(--accent);padding:13px 16px;padding-top:max(13px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:5}
  .ed-back{font-family:var(--mono);font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:600;letter-spacing:.05em}
  .ed-nav{display:flex;gap:8px}
  .ed-nav button{font-family:var(--mono);font-size:12px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);border-radius:5px;padding:6px 12px;cursor:pointer}
  .ed-body{max-width:600px;margin:0 auto;padding:16px}
  .photo{position:relative;width:100%;aspect-ratio:4/3;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;align-items:center;justify-content:center}
  .photo img{width:100%;height:100%;object-fit:contain;background:#fff}
  .ph-none{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;padding:20px}
  .ph-none .x{display:block;font-size:26px;color:var(--border);margin-bottom:8px}
  .ph-flag{position:absolute;top:8px;left:8px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;border-radius:4px;background:var(--good);color:#04200f;font-weight:600}
  .photo-actions{display:flex;gap:8px;margin:8px 0 4px}
  label.fl{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:16px 0 6px}
  input.fi,textarea.fi,select.fi{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:15px;padding:11px 12px;resize:vertical;line-height:1.45}
  select.fi{font-family:var(--mono);font-size:14px}
  input.fi:focus,textarea.fi:focus,select.fi:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(237,52,38,.15)}
  .fi.changed{border-color:var(--warn)}
  textarea.fi{min-height:80px}
  .row2{display:flex;gap:10px}.row2>div{flex:1}
  .tag-grid{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-family:var(--mono);font-size:11px;padding:7px 11px;border-radius:var(--r);cursor:pointer;background:var(--surface);border:1.5px solid var(--border);color:var(--muted);transition:.12s}
  .tag.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .tag.kind.on{background:var(--surface2);border-color:var(--muted);color:var(--text)}
  .names{margin-top:2px}
  .name-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
  .name-row .txt{flex:1;font-size:14px;word-break:break-word}
  .name-row.active .txt{font-weight:700}
  .star{background:none;border:none;color:var(--accent);font-size:17px;cursor:pointer;padding:0;width:24px;flex-shrink:0}
  .name-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px 6px;flex-shrink:0}
  .name-add{display:flex;gap:8px;margin-top:8px}.name-add input{flex:1}
  .chk{display:flex;align-items:center;gap:10px;margin-top:16px;font-size:14px}
  .chk input{width:20px;height:20px;accent-color:var(--accent)}
  .rm-btn{width:100%;margin-top:22px;font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;border:1.5px solid var(--danger);background:transparent;color:var(--danger);border-radius:var(--r);padding:13px;cursor:pointer}
  .rm-btn.on{background:var(--danger);color:#fff}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);border-radius:5px;padding:10px 11px;cursor:pointer;flex:1;text-align:center}
  .btn.up{border-color:var(--accent);color:var(--accent2)}
  .navbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1.5px solid var(--accent);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));z-index:40}
  .navbar-in{max-width:600px;margin:0 auto;display:flex;gap:9px}
  .navbar .btn{padding:13px;font-size:11px}
  .btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
  .summary{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;margin-top:9px}
  .summary b{color:var(--warn)}.summary .g{color:var(--good)}.summary .r{color:var(--danger)}
</style>
</head>
<body>
<header>
  <div class="htop"><div class="brand"><b>//</b> limber · review+</div><div class="count" id="count"></div></div>
  <input class="search" id="search" placeholder="search…" oninput="renderGrid()">
  <div class="filters" id="filters"></div>
</header>
<div class="wrap"><div class="grid" id="grid"></div></div>

<div class="editor" id="editor"><div class="ed-head">
  <button class="ed-back" onclick="closeEd()">‹ back</button>
  <div class="ed-nav"><button onclick="navEd(-1)">‹ prev</button><button onclick="navEd(1)">next ›</button></div>
</div><div class="ed-body" id="ed-body"></div></div>

<div class="navbar"><div class="navbar-in">
  <button class="btn" onclick="clearAll()">Clear</button>
  <button class="btn" onclick="exportEdits()">Edits JSON</button>
  <button class="btn accent" onclick="exportZip()">Photos ZIP</button>
</div><div class="summary" id="summary"></div></div>

<input type="file" id="filepick" accept="image/*" style="display:none">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const STRETCHES=[{"id":"neck-side","name":"Lateral Neck Stretch","names":[],"parts":[],"kind":[],"area":"neck","type":"static","dur":30,"bilateral":true,"desc":"Sitting or standing tall, gently tilt your head so your ear moves toward your shoulder until you feel a stretch along the opposite side of the neck.","cues":"Keep both shoulders down. Let the head be heavy — no forcing."},{"id":"neck-flexor","name":"Anterior Neck Stretch","names":[],"parts":[],"kind":[],"area":"neck","type":"static","dur":25,"bilateral":false,"desc":"Gently tip the head back to look up toward the ceiling, feeling a stretch along the front of the neck.","cues":"Small range. Stop if you feel any pinching at the back of the neck."},{"id":"neck-extensor","name":"Posterior Neck Stretch","names":[],"parts":["Neck","Upper back"],"kind":[],"area":"neck","type":"static","dur":30,"bilateral":false,"desc":"Drop the chin toward the chest until you feel a stretch along the back of the neck.","cues":"Let the weight of the head do the work. Relax the shoulders."},{"id":"chin-tuck","name":"Chin Tucks","names":[],"parts":[],"kind":[],"area":"neck","type":"mobility","dur":20,"bilateral":false,"desc":"Draw your chin straight back, creating a gentle double chin while keeping your head level. Hold briefly, then relax.","cues":"Keep eyes level. A retraction, not a nod."},{"id":"rotating-neck","name":"Neck Rotations","names":[],"parts":[],"kind":[],"area":"neck","type":"mobility","dur":30,"bilateral":true,"desc":"Slowly turn the head to look over one shoulder, feeling a stretch along the side of the neck. Switch sides.","cues":"Move slowly and smoothly. Keep the shoulders square."},{"id":"neck-circle","name":"Neck Circles","names":[],"parts":[],"kind":["Mobility drill","Dynamic warm-up"],"area":"neck","type":"mobility","dur":30,"bilateral":false,"desc":"Slowly circle the head, dropping the chin toward the chest and around. Avoid rolling the head far back.","cues":"Move through the front range only. Slow and controlled."},{"id":"seated-neck-side","name":"Cross-Legged Lateral Neck & Biceps Stretch","names":[],"parts":["Neck","Arms"],"kind":[],"area":"neck","type":"static","dur":30,"bilateral":true,"desc":"Seated tall, tilt the ear toward the shoulder. Optionally rest the hand over the head for gentle added weight.","cues":"Anchor the opposite shoulder down. Gentle, no pulling."},{"id":"overhead-triceps","name":"Overhead Triceps Stretch","names":[],"parts":[],"kind":[],"area":"shoulders","type":"static","dur":30,"bilateral":true,"desc":"Reach one arm overhead and bend the elbow so the hand drops behind the neck. Gently press the elbow with the other hand.","cues":"Reach the hand down the spine. Keep the head tall."},{"id":"bent-arm-chest","name":"Bent Arm Chest Stretch","names":[],"parts":["Chest","Arms"],"kind":[],"area":"shoulders","type":"static","dur":30,"bilateral":true,"desc":"Place a bent arm against a wall or doorframe at shoulder height and turn the body away to stretch the chest and front shoulder.","cues":"Forearm flat, rotate the chest open. Switch sides."},{"id":"clasped-chest-opener","name":"Clasped-Hands Chest Opener","names":["Clasped-Hands Chest Opener","Standing Chest Opener","Behind-Back Clasp Stretch"],"parts":["Chest","Shoulders","Arms"],"kind":["Static hold"],"area":"chest","type":"static","dur":45,"bilateral":false,"desc":"Stand tall and clasp your hands behind your back, interlacing the fingers. Straighten the arms and draw the shoulder blades together and down, lifting the clasped hands away from the lower back. Push the chest forward and up, gently looking toward the ceiling to deepen the opening across the front of the chest and shoulders.","cues":"Keep arms straight and shoulders away from the ears. Lift the chest, don\\u2019t arch the lower back \\u2014 keep the core gently engaged. Look up only as far as the neck is comfortable."},{"id":"floor-chest","name":"Floor Chest Stretch","names":["Floor Chest Stretch","Prone Pec Stretch","Lying Pec Stretch"],"parts":["Chest","Shoulders","Arms"],"kind":["Static hold"],"area":"chest","type":"static","dur":30,"bilateral":true,"desc":"Lie face down with one arm stretched straight out to the side at shoulder height, palm down. Press into the floor with the other hand to roll gently onto the side of the outstretched arm until you feel a stretch across the chest and front of the shoulder.","cues":"Roll only until you feel a gentle stretch, not pain. Keep the outstretched arm relaxed on the floor. Switch sides."},{"id":"doorway-chest","name":"Doorway Chest Stretch","names":["Doorway Chest Stretch","Doorway Pec Stretch","Rack Doorway Pec Stretch"],"parts":["Chest","Shoulders","Arms"],"kind":["Static hold"],"area":"chest","type":"static","dur":40,"bilateral":false,"desc":"Stand in a doorway or between squat-rack uprights. Place both forearms on the frames with elbows bent about 90 degrees at shoulder height. Step one foot through and lean your chest forward until you feel a stretch across both pecs and the front of the shoulders.","cues":"Keep the chest proud and shoulder blades drawing together. Lean from the hips, not the lower back. Adjust elbow height to shift the stretch higher or lower on the chest."},{"id":"behind-bar-chest","name":"Hanging Bar Chest Opener","names":["Hanging Bar Chest Opener","Dead Hang Chest Stretch","Squat-Bar Hang Chest Opener"],"parts":["Chest","Shoulders","Arms"],"kind":["Static hold"],"area":"chest","type":"static","dur":45,"bilateral":false,"desc":"Take a dead hang from a pull-up bar with a barbell set behind you at about upper-back height (squat-rack height). Let the body hang and relax so the bar behind you nudges the torso gently forward, opening the chest. Keep the ribs drawn down so the stretch stays across the chest rather than arching the lower back.","cues":"Ribs down, no lower-back arch. Let the shoulders and chest relax open against the bar. Keep a light, even grip and breathe slowly. Ease off if the shoulders feel pinched."},{"id":"rear-deltoid","name":"Cross-Body Rear Delt Stretch","names":[],"parts":[],"kind":[],"area":"shoulders","type":"static","dur":30,"bilateral":true,"desc":"Draw one straight arm across the body and hold it in with the opposite forearm to stretch the back of the shoulder.","cues":"Keep the arm straight and low across the chest."},{"id":"arm-up-rotator","name":"Standing Stick-Assisted Shoulder External Rotation Stretch","names":[],"parts":[],"kind":[],"area":"shoulders","type":"static","dur":30,"bilateral":true,"desc":"Raise the arm out to the side, elbow bent 90° with the hand pointing up, and gently rotate the forearm back.","cues":"Keep the elbow at shoulder height. Move slowly."},{"id":"elbows-back","name":"Elbows-Back Chest Opener","names":[],"parts":["Arms","Chest"],"kind":[],"area":"shoulders","type":"static","dur":30,"bilateral":false,"desc":"Bend both elbows and draw them back behind you, squeezing the shoulder blades together to open the chest.","cues":"Lift the chest, pull the elbows toward each other."},{"id":"reverse-shoulder","name":"Behind-Back Chest and Shoulder Opener","names":[],"parts":["Shoulders","Chest"],"kind":[],"area":"shoulders","type":"static","dur":30,"bilateral":false,"desc":"Clasp the hands behind the back and lift the arms gently to stretch the front of the shoulders and chest.","cues":"Roll the shoulders back, squeeze the blades together."},{"id":"above-head-chest","name":"Overhead Chest Opener","names":[],"parts":[],"kind":[],"area":"shoulders","type":"static","dur":30,"bilateral":false,"desc":"Clasp the hands overhead with palms up and gently press back and up to open the chest and shoulders.","cues":"Lengthen up, keep the ribs from flaring."},{"id":"shoulder-circle","name":"Shoulder Rolls","names":[],"parts":[],"kind":["Mobility drill","Dynamic warm-up"],"area":"shoulders","type":"mobility","dur":25,"bilateral":false,"desc":"Roll the shoulders in slow, full circles, forward then backward.","cues":"Big slow circles. Loosen with each rotation."},{"id":"arm-crossover","name":"Cross-Body Arm Swing","names":[],"parts":["Shoulders","Upper back"],"kind":["Mobility drill","Dynamic warm-up"],"area":"shoulders","type":"static","dur":30,"bilateral":false,"desc":"Bring one arm across the body and gently press it toward the chest with the other arm.","cues":"Relax the shoulder down as you draw the arm in."},{"id":"wrist-flexor","name":"Single-Arm Wrist Flexor Stretch","names":[],"parts":[],"kind":[],"area":"shoulders","type":"static","dur":20,"bilateral":true,"desc":"Extend one arm with the palm up and gently pull the fingers down and back with the other hand.","cues":"Feel it along the inner forearm. Keep the elbow straight."},{"id":"wrist-extensor","name":"Single-Arm Wrist Extensor Stretch","names":[],"parts":[],"kind":[],"area":"shoulders","type":"static","dur":20,"bilateral":true,"desc":"Extend one arm with the palm down and gently pull the fingers down and back with the other hand.","cues":"Feel it along the top of the forearm. Gentle pressure."},{"id":"wrist-circles","name":"Wrist Circles","names":[],"parts":[],"kind":["Mobility drill","Dynamic warm-up"],"area":"shoulders","type":"mobility","dur":20,"bilateral":false,"desc":"Make loose fists and circle the wrists slowly in both directions.","cues":"Full slow circles each way to warm the joints."},{"id":"finger-extension","name":"Finger Extension Stretch","names":[],"parts":[],"kind":[],"area":"shoulders","type":"static","dur":20,"bilateral":true,"desc":"Gently draw the fingers back toward the forearm with the opposite hand, opening the palm.","cues":"Open the hand fully. Easy pressure."},{"id":"finger-flexor","name":"Finger Flexor Stretch","names":[],"parts":[],"kind":[],"area":"shoulders","type":"static","dur":20,"bilateral":true,"desc":"Gently curl and press the fingers in toward the palm side with the other hand.","cues":"Mild stretch across the top of the fingers and hand."},{"id":"thumb-stretch","name":"Thumb Stretch","names":[],"parts":[],"kind":[],"area":"shoulders","type":"static","dur":15,"bilateral":true,"desc":"Gently draw the thumb back and away from the palm with the other hand.","cues":"Very light — the thumb joint is delicate."},{"id":"cat-cow","name":"Cat-Cow","names":[],"parts":["Lower back","Upper back","Hips","Glutes","Core"],"kind":["Dynamic warm-up","Mobility drill"],"area":"back","type":"mobility","dur":45,"bilateral":false,"desc":"On hands and knees, alternate arching the back and dropping the belly (cow) with rounding the spine and tucking the chin (cat).","cues":"Move with the breath — inhale to arch, exhale to round."},{"id":"cat-pose","name":"Marjaryasana (Cat Pose)","names":[],"parts":["Lower back","Upper back","Hips","Core"],"kind":[],"area":"back","type":"static","dur":30,"bilateral":false,"desc":"On hands and knees, round the spine toward the ceiling and tuck the chin.","cues":"Push the floor away, spread the shoulder blades."},{"id":"cow-stretch","name":"Bitilasana (Cow Pose)","names":[],"parts":["Lower back","Upper back","Hips","Glutes","Core"],"kind":[],"area":"back","type":"static","dur":30,"bilateral":false,"desc":"On hands and knees, drop the belly and lift the chest and tailbone into a gentle arch.","cues":"Open the chest forward, keep the neck long."},{"id":"child-pose","name":"Balasana (Child's Pose)","names":[],"parts":[],"kind":["Static hold","Restorative"],"area":"back","type":"restorative","dur":60,"bilateral":false,"desc":"Kneel and sit back on the heels, folding forward to rest the forehead down and reach the arms forward.","cues":"Let the chest melt toward the floor. Breathe into the back."},{"id":"thread-the-needle","name":"Parsva Balasana (Thread the Needle Pose)","names":[],"parts":["Shoulders","Upper back"],"kind":[],"area":"back","type":"static","dur":45,"bilateral":true,"desc":"From hands and knees, slide one arm underneath the body and rest the shoulder and temple on the floor, rotating the upper back.","cues":"Let the top shoulder relax down. Switch sides."},{"id":"cobra","name":"Bhujangasana (Cobra Pose)","names":[],"parts":[],"kind":["Static hold","Mobility drill","Dynamic warm-up","Strengthening"],"area":"back","type":"static","dur":30,"bilateral":false,"desc":"Lie face down and press through the hands to lift the chest, keeping the hips on the floor.","cues":"Shoulders down and back. Lead with the chest, not the chin."},{"id":"sphinx","name":"Salamba Bhujangasana (Sphinx Pose)","names":[],"parts":["Lower back","Upper back"],"kind":[],"area":"back","type":"static","dur":60,"bilateral":false,"desc":"Lie face down and prop onto the forearms with elbows under the shoulders, lifting the chest into a gentle backbend.","cues":"Relax the glutes. Long, easy backbend."},{"id":"upward-dog","name":"Upward-Facing Dog","names":[],"parts":["Upper back","Lower back"],"kind":[],"area":"back","type":"static","dur":30,"bilateral":false,"desc":"From face down, press through the hands and tops of the feet to lift the chest and thighs off the floor.","cues":"Press down to lift up. Shoulders away from the ears."},{"id":"puppy-pose","name":"Puppy Pose","names":[],"parts":["Shoulders","Neck"],"kind":[],"area":"back","type":"static","dur":60,"bilateral":false,"desc":"From hands and knees, walk the hands forward and melt the chest toward the floor, hips staying over the knees.","cues":"Keep the hips high, let the heart sink down."},{"id":"supine-twist","name":"Supta Matsyendrasana (Supine Spinal Twist)","names":[],"parts":["Upper back","Lower back","Chest"],"kind":[],"area":"back","type":"static","dur":45,"bilateral":true,"desc":"Lying on the back, draw one knee across the body toward the floor while keeping both shoulders down.","cues":"Gaze away from the knee. Let gravity do the work."},{"id":"lying-knee-to-chest","name":"Supine Single Knee-to-Chest Stretch","names":[],"parts":["Glutes","Hips","Hamstrings"],"kind":[],"area":"back","type":"static","dur":30,"bilateral":true,"desc":"On the back, hug one knee into the chest, keeping the lower back relaxed on the floor.","cues":"Draw the knee gently — no need to crank it."},{"id":"double-knee-to-chest","name":"Apanasana (Knees-to-Chest Pose)","names":[],"parts":[],"kind":["Mobility drill","Dynamic warm-up","Restorative"],"area":"back","type":"static","dur":30,"bilateral":false,"desc":"Lying on the back, hug both knees into the chest and gently rock.","cues":"Massage the lower back into the floor. Breathe."},{"id":"lying-knee-roll","name":"Bent Knees Supine Lower-Back Twist","names":[],"parts":["Lower back","Glutes","Hips"],"kind":[],"area":"back","type":"static","dur":40,"bilateral":true,"desc":"On the back with knees bent, roll both knees to one side and hold, feeling the stretch through the lower back and hip.","cues":"Let the knees be heavy. Switch sides."},{"id":"seated-lower-back","name":"Seated Forward Fold","names":[],"parts":[],"kind":[],"area":"back","type":"static","dur":35,"bilateral":false,"desc":"Seated, fold forward over the legs, rounding the back gently to release the lower spine.","cues":"Let the head and arms hang heavy."},{"id":"upper-back","name":"Rounded Upper-Back Stretch","names":[],"parts":[],"kind":[],"area":"back","type":"static","dur":30,"bilateral":false,"desc":"Clasp the hands in front and round forward through the upper back, separating the shoulder blades.","cues":"Tuck the chin, hollow the chest."},{"id":"child-to-cobra","name":"Child's Pose to Cobra Flow","names":[],"parts":[],"kind":["Mobility drill","Dynamic warm-up"],"area":"back","type":"mobility","dur":45,"bilateral":false,"desc":"Flow between child’s pose and cobra, moving the spine through flexion and extension.","cues":"Move slowly with the breath, segment by segment."},{"id":"kneeling-back-rotation","name":"Kneeling Back Rotation Stretch","names":[],"parts":[],"kind":[],"area":"back","type":"mobility","dur":35,"bilateral":true,"desc":"From hands and knees, place one hand behind the head and rotate the elbow up toward the ceiling, opening the chest.","cues":"Follow the e r back","Upper back","Glutes"],"kind":["Static hold","Restorative"],"area":"back","type":"restorative","dur":60,"bilateral":false,"desc":"Lie face down with the forehead resting on stacked hands, fully relaxing the back.","cues":"Soften completely. Slow breathing."},{"id":"animal-resting","name":"Saithalyasana (Animal Resting Pose)","names":[],"parts":["Lower back","Upper back","Glutes"],"kind":["Restorative","Static hold"],"area":"hips","type":"restorative","dur":60,"bilateral":true,"desc":"Kneeling and sitting back, turn the torso toward one bent knee, reach the arms overhead, and fold forward over that knee to rest, combining a gentle side-bend and twist with a forward fold.","cues":"Move with the breath \\u2014 inhale to lift, exhale to fold. Relax the back. Switch sides."},{"id":"standing-figure-four","name":"Eka Pada Utkatasana (Standing Figure Four)","names":[],"parts":[],"kind":["Static hold","Strengthening"],"area":"hips","type":"balance","dur":35,"bilateral":true,"desc":"Cross one ankle over the opposite knee and sit the hips back, balancing on one leg.","cues":"Use a wall for balance. Sit back. Switch sides."},{"id":"standing-balance-hip-rotation","name":"Standing Hip Rotations","names":[],"parts":["Hips","Glutes"],"kind":["Mobility drill","Strengthening","Dynamic warm-up"],"area":"hips","type":"mobility","dur":35,"bilateral":true,"desc":"Balancing on one leg, lift the other knee and rotate the hip open and closed.","cues":"Controlled circles. Use support if needed. Switch sides."},{"id":"heel-press","name":"Single Leg Calf Stretch (Wall)","names":[],"parts":[],"kind":[],"area":"legs","type":"static","dur":30,"bilateral":true,"desc":"Press one heel down and back to stretch the calf, like a standing calf stretch.","cues":"Keep the leg straight, heel grounded. Switch sides."},{"id":"standing-toe-up-calf","name":"Single Leg Calf Stretch (Step)","names":[],"parts":[],"kind":[],"area":"legs","type":"static","dur":30,"bilateral":true,"desc":"Place the toes up a obility drill"],"area":"hips","type":"dynamic","dur":30,"bilateral":true,"desc":"Stand on one leg, lift the other knee and circle it open and out, opening the hip.","cues":"Slow controlled circles. Open the hip out. Switch legs."},{"id":"elephant-walks","name":"Elephant Walks","names":[],"parts":["Hamstrings","Glutes","Lower back","Upper back"],"kind":["Dynamic warm-up","Mobility drill"],"area":"legs","type":"dynamic","dur":30,"bilateral":false,"desc":"Hinge into a forward fold with hands on the floor, then alternately bend and straighten each knee, walking it out.","cues":"Bend one knee while straightening the other. Keep it flowing."},{"id":"windshield-wipers","name":"Windshield Wipers","names":[],"parts":["Hips"],"kind":["Mobility drill","Dynamic warm-up"],"area":"hips","type":"mobility","dur":30,"bilateral":false,"desc":"Seated or lying with knees bent, drop both knees side to side like windshield wipers to rotate the hips and lower back.","cues":"Smooth side to side. Let the hips rotate."},{"id":"scapular-pushups","name":"Scapular Push-Ups","names":[],"parts":["Shoulders","Upper back"],"kind":["Dynamic warm-up","Mobility drill"],"area":"shoulders","type":"dynamic","dur":30,"bilateral":false,"desc":"In a plank or against a wall, keep the arms straight and push the shoulder blades apart, then squeeze them together.","cues":"Arms stay straight — move only the shoulder blades."},{"id":"windmills","name":"Windmills","names":[],"parts":["Lower back","Core","Glutes"],"kind":["Dynamic warm-up","Strengthening","Mobility drill"],"area":"back","type":"dynamic","dur":30,"bilateral":false,"desc":"Stand wide, hinge forward, and rotate to reach one hand toward the opposite foot while the other reaches up, alternating sides.","cues":"Reach one hand down, the other up. Alternate with control."},{"id":"scorpion","name":"Scorpion Stretch","names":[],"parts":["Lower back","Chest"],"kind":["Static hold"],"area":"back","type":"dynamic","dur":30,"bilateral":true,"desc":"Lie face down with arms out wide. Lift one leg and reach the foot across the body toward the opposite hand, rotating the lower spine and hip.","cues":"Keep the chest down. Rotate gently — don\\u2019t force the reach. Switch sides."},{"id":"reverse-prayer","name":"Reverse Prayer","names":[],"parts":["Wrists/forearms","Shoulders","Chest"],"kind":[],"area":"shoulders","type":"static","dur":30,"bilateral":false,"desc":"Bring the palms together behind the back, fingers pointing up, and gently press them flat to stretch the wrists, forearms and chest.","cues":"Draw the elbows back and lift the chest. Ease into it — wrists are delicate."},{"id":"cow-face","name":"Gomukhasana (Cow Face Pose)","names":[],"parts":["Arms","Shoulders"],"kind":[],"area":"shoulders","type":"static","dur":30,"bilateral":true,"desc":"Reach one arm overhead and bend it down the back, and the other arm behind and up the back, trying to clasp the hands between the shoulder blades.","cues":"Use a strap if the hands don\\u2019t meet. Keep the top elbow pointing up. Switch sides."},{"id":"dead-hang","name":"Dead Hang","names":[],"parts":["Full body"],"kind":["Static hold","Strengthening"],"area":"shoulders","type":"static","dur":30,"bilateral":false,"desc":"Hang from a bar with both hands, arms straight, letting the body relax to decompress the spine and stretch the shoulders and lats.","cues":"Relax the shoulders and let gravity lengthen you. Keep a light grip-aware hold."}];
const PARTS=["Neck","Shoulders","Chest","Upper back","Lower back","Arms","Biceps","Triceps","Wrists/forearms","Core","Glutes","Hips","Hamstrings","Quads","Adductors","Calves","Ankles","Full body"];
const KINDS=["Static hold","Mobility drill","Dynamic warm-up","Strengthening","Nerve floss","Restorative"];
const EXTS=['jpg','jpeg','png','webp','JPG','JPEG','PNG'];
const byId={};STRETCHES.forEach(s=>byId[s.id]=s);

// state
const edits={};       // id -> {field:newval,...}  (only changed fields)
const photos={};      // id -> {dataUrl,blob}
const removals=new Set();
const existing={};
let filter='all', curId=null, activeUpload=null;

// ---- working copy: original + edits merged ----
function val(id,field){
  if(edits[id]&&field in edits[id])return edits[id][field];
  return byId[id][field];
}
function setVal(id,field,v){
  const orig=byId[id][field];
  const same=JSON.stringify(orig)===JSON.stringify(v);
  if(!edits[id])edits[id]={};
  if(same)delete edits[id][field]; else edits[id][field]=v;
  if(edits[id]&&Object.keys(edits[id]).length===0)delete edits[id];
  saveMeta();
}
function isEdited(id){return !!edits[id]&&Object.keys(edits[id]).length>0;}

// ---- existing photo probe ----
function probe(id){return new Promise(res=>{let i=0;const t=()=>{if(i>=EXTS.length)return res(false);const im=new Image();im.onload=()=>res('photos/'+id+'.'+EXTS[i]);im.onerror=()=>{i++;t();};im.src='photos/'+id+'.'+EXTS[i]+'?t='+Date.now();};t();});}
async function detectExisting(){for(let i=0;i<STRETCHES.length;i+=12){await Promise.all(STRETCHES.slice(i,i+12).map(async s=>{const r=await probe(s.id);if(r)existing[s.id]=r;}));renderGrid();}}

// ---- filters ----
const FILTERS=[['all','All'],['missing','No photo'],['newphoto','New photos'],['edited','Edited'],['removing','Flagged']];
function setFilter(f){filter=f;renderGrid();}
function matchFilter(s){
  const hasPhoto=existing[s.id]||photos[s.id];
  if(filter==='missing')return !hasPhoto;
  if(filter==='newphoto')return !!photos[s.id];
  if(filter==='edited')return isEdited(s.id);
  if(filter==='removing')return removals.has(s.id);
  return true;
}
function renderFilters(){
  const c={all:STRETCHES.length,missing:STRETCHES.filter(s=>!existing[s.id]&&!photos[s.id]).length,newphoto:Object.keys(photos).length,edited:Object.keys(edits).length,removing:removals.size};
  document.getElementById('filters').innerHTML=FILTERS.map(([k,l])=>`<div class="chip ${filter===k?'on':''}" onclick="setFilter('${k}')">${l}<span class="n">${c[k]}</span></div>`).join('');
}

// ---- grid ----
function renderGrid(){
  renderFilters();
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  const items=STRETCHES.filter(s=>matchFilter(s)&&(!q||val(s.id,'name').toLowerCase().includes(q)||s.id.includes(q)));
  document.getElementById('count').textContent=items.length+' / '+STRETCHES.length;
  document.getElementById('grid').innerHTML=items.map(s=>{
    const up=photos[s.id],ex=existing[s.id],ed=isEdited(s.id),rm=removals.has(s.id);
    const src=up?up.dataUrl:(ex||null);
    return `<div class="card ${ed?'edited':''} ${up?'newphoto':''} ${rm?'removing':''}" onclick="openEd('${s.id}')">
      <div class="cph">${src?`<img src="${src}">`:'<div class="cph-none"><span class="x">⊘</span>no photo</div>'}
        ${up?'<div class="cflag p">photo</div>':''}${ed&&!up?'<div class="cflag e">edited</div>':''}${rm?'<div class="cflag r">flagged</div>':''}</div>
      <div class="cmeta"><div class="cnm">${val(s.id,'name')}</div><div class="cid">${s.id}</div></div>
    </div>`;
  }).join('');
  updateSummary();
}

// ---- editor ----
function openEd(id){curId=id;document.getElementById('editor').classList.add('open');renderEd();window.scrollTo(0,0);}
function closeEd(){document.getElementById('editor').classList.remove('open');curId=null;renderGrid();}
function navEd(d){
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  const items=STRETCHES.filter(s=>matchFilter(s)&&(!q||val(s.id,'name').toLowerCase().includes(q)||s.id.includes(q)));
  const i=items.findIndex(s=>s.id===curId);
  const ni=i+d;if(ni<0||ni>=items.length)return;
  curId=items[ni].id;renderEd();document.getElementById('editor').scrollTo(0,0);
}

function renderEd(){
  const id=curId,s=byId[id];
  const up=photos[id],ex=existing[id];
  const src=up?up.dataUrl:(ex||null);
  const names=val(id,'names')||[];
  const primaryName=val(id,'name');
  const parts=val(id,'parts')||[];
  const kind=val(id,'kind')||[];
  const ch=f=>JSON.stringify(byId[id][f])!==JSON.stringify(val(id,f))?'changed':'';
  document.getElementById('ed-body').innerHTML=`
    <div class="photo">${src?`<img src="${src}">`:'<div class="ph-none"><span class="x">⊘</span>no photo yet</div>'}${up?'<div class="ph-flag">new photo</div>':''}</div>
    <div class="photo-actions">
      <button class="btn up" onclick="pick('${id}')">${src?'Replace photo':'Add photo'}</button>
      ${up?`<button class="btn" onclick="undoPhoto('${id}')">✕ discard</button>`:''}
    </div>

    <label class="fl">Display name</label>
    <input class="fi ${ch('name')}" value="${esc(primaryName)}" onchange="setVal('${id}','name',this.value);renderEd2()">

    <label class="fl">Alternate names <span style="text-transform:none;letter-spacing:0;opacity:.6">— star = primary</span></label>
    <div class="names" id="names"></div>
    <div class="name-add"><input class="fi" id="newname" placeholder="add alternate name…"><button class="btn" style="flex:0 0 auto" onclick="addName('${id}')">+ add</button></div>

    <label class="fl">Description</label>
    <textarea class="fi ${ch('desc')}" onchange="setVal('${id}','desc',this.value)">${esc(val(id,'desc'))}</textarea>

    <label class="fl">Cues</label>
    <textarea class="fi ${ch('cues')}" onchange="setVal('${id}','cues',this.value)">${esc(val(id,'cues'))}</textarea>

    <label class="fl">Body parts</label>
    <div class="tag-grid">${PARTS.map(p=>`<div class="tag ${parts.includes(p)?'on':''}" onclick="togglePart('${id}','${esc(p)}')">${p}</div>`).join('')}</div>

    <label class="fl">Kind</label>
    <div class="tag-grid">${KINDS.map(k=>`<div class="tag kind ${kind.includes(k)?'on':''}" onclick="toggleKind('${id}','${esc(k)}')">${k}</div>`).join('')}</div>

    <div class="row2">
      <div><label class="fl">Duration (s)</label><input class="fi ${ch('dur')}" type="number" value="${val(id,'dur')}" onchange="setVal('${id}','dur',+this.value)"></div>
      <div><label class="fl">Area</label><input class="fi ${ch('area')}" value="${esc(val(id,'area'))}" onchange="setVal('${id}','area',this.value)"></div>
    </div>

    <label class="chk"><input type="checkbox" ${val(id,'bilateral')?'checked':''} onchange="setVal('${id}','bilateral',this.checked)"> Bilateral (per-side, splits duration)</label>

    <div class="id-row" style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:18px">id: <b style="color:var(--text)">${id}</b> · photo file: <b style="color:var(--text)">${id}.jpg</b></div>

    <button class="rm-btn ${removals.has(id)?'on':''}" onclick="toggleRm('${id}')">${removals.has(id)?'✓ Keep exercise':'⊘ Remove exercise'}</button>
  `;
  renderNames();
}
function renderEd2(){renderEd();} // full re-render after name change

function renderNames(){
  const id=curId;const names=(val(id,'names')||[]).slice();const primary=val(id,'name');
  const box=document.getElementById('names');if(!box)return;
  if(!names.length){box.innerHTML='<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:6px 0">No alternates. Add one below.</div>';return;}
  box.innerHTML=names.map((n,i)=>`<div class="name-row ${n===primary?'active':''}">
    <button class="star" onclick="makePrimary('${id}',${i})">${n===primary?'★':'☆'}</button>
    <span class="txt">${esc(n)}</span>
    <button class="name-x" onclick="delName('${id}',${i})">✕</button></div>`).join('');
}
function addName(id){const inp=document.getElementById('newname');const v=(inp.value||'').trim();if(!v)return;const names=(val(id,'names')||[]).slice();names.push(v);setVal(id,'names',names);inp.value='';renderNames();renderGrid();}
function delName(id,i){const names=(val(id,'names')||[]).slice();names.splice(i,1);setVal(id,'names',names);renderNames();}
function makePrimary(id,i){const names=(val(id,'names')||[]).slice();const n=names[i];setVal(id,'name',n);renderEd();}
function togglePart(id,p){const a=(val(id,'parts')||[]).slice();const i=a.indexOf(p);i<0?a.push(p):a.splice(i,1);setVal(id,'parts',a);renderEd();}
function toggleKind(id,k){const a=(val(id,'kind')||[]).slice();const i=a.indexOf(k);i<0?a.push(k):a.splice(i,1);setVal(id,'kind',a);renderEd();}
function toggleRm(id){removals.has(id)?removals.delete(id):removals.add(id);saveMeta();renderEd();}

// ---- photos ----
function pick(id){activeUpload=id;document.getElementById('filepick').click();}
function undoPhoto(id){delete photos[id];dbDelPhoto(id);renderEd();}
document.getElementById('filepick').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f||!activeUpload)return;const id=activeUpload;activeUpload=null;e.target.value='';
  const {dataUrl,blob}=await processImage(f);photos[id]={dataUrl,blob};dbSetPhoto(id,blob,dataUrl);renderEd();
});
function processImage(file){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>{const MAX=800;let{width:w,height:h}=img;if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>=w&&h>MAX){w=Math.round(w*MAX/h);h=MAX;}const c=document.createElement('canvas');c.width=w;c.height=h;const x=c.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,w,h);x.drawImage(img,0,0,w,h);c.toBlob(b=>{const r=new FileReader();r.onload=()=>res({dataUrl:r.result,blob:b});r.readAsDataURL(b);},'image/jpeg',0.82);};img.onerror=rej;img.src=URL.createObjectURL(file);});}

// ---- export ----
async function exportZip(){
  const ids=Object.keys(photos);if(!ids.length){alert('No photos uploaded yet.');return;}
  const zip=new JSZip();const folder=zip.folder('photos');
  for(const id of ids)folder.file(id+'.jpg',photos[id].blob);
  folder.file('_manifest.txt','Limber photos\n'+ids.length+' files\n\n'+ids.map(i=>i+'.jpg').join('\n'));
  dl(await zip.generateAsync({type:'blob'}),'limber-photos.zip');
}
function exportEdits(){
  const out={edits:{},removals:[...removals]};
  Object.keys(edits).forEach(id=>{if(Object.keys(edits[id]).length)out.edits[id]=edits[id];});
  if(!Object.keys(out.edits).length&&!out.removals.length){alert('No edits or removals yet.');return;}
  dl(new Blob([JSON.stringify(out,null,2)],{type:'application/json'}),'limber-edits.json');
}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();}

function updateSummary(){
  const e=Object.keys(edits).length,p=Object.keys(photos).length,r=removals.size;
  document.getElementById('summary').innerHTML=`<b>${e}</b> edited · <span class="g">${p}</span> photos · <span class="r">${r}</span> flagged`;
}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ---- persistence (IndexedDB) ----
let _db=null;
function db(){if(_db)return Promise.resolve(_db);return new Promise((res,rej)=>{const r=indexedDB.open('limber-review-plus',1);r.onupgradeneeded=()=>{const d=r.result;if(!d.objectStoreNames.contains('photos'))d.createObjectStore('photos');if(!d.objectStoreNames.contains('meta'))d.createObjectStore('meta');};r.onsuccess=()=>{_db=r.result;res(_db);};r.onerror=()=>rej(r.error);});}
async function dbSetPhoto(id,blob,dataUrl){const d=await db();return new Promise((res,rej)=>{const tx=d.transaction('photos','readwrite');tx.objectStore('photos').put({blob,dataUrl},id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}
async function dbDelPhoto(id){const d=await db();return new Promise((res,rej)=>{const tx=d.transaction('photos','readwrite');tx.objectStore('photos').delete(id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}
async function dbAllPhotos(){const d=await db();return new Promise((res,rej)=>{const out={};const tx=d.transaction('photos','readonly');const cur=tx.objectStore('photos').openCursor();cur.onsuccess=e=>{const c=e.target.result;if(c){out[c.key]=c.value;c.continue();}else res(out);};cur.onerror=()=>rej(cur.error);});}
let saveT=null;
function saveMeta(){clearTimeout(saveT);saveT=setTimeout(async()=>{try{const d=await db();const tx=d.transaction('meta','readwrite');tx.objectStore('meta').put(edits,'edits');tx.objectStore('meta').put([...removals],'removals');}catch(e){}},300);}
async function loadSaved(){
  try{
    const ph=await dbAllPhotos();for(const id in ph)photos[id]={dataUrl:ph[id].dataUrl,blob:ph[id].blob};
    const d=await db();
    await new Promise(res=>{const tx=d.transaction('meta','readonly');const e=tx.objectStore('meta').get('edits');e.onsuccess=()=>{if(e.result)Object.assign(edits,e.result);const r=tx.objectStore('meta').get('removals');r.onsuccess=()=>{(r.result||[]).forEach(id=>removals.add(id));res();};};});
    renderGrid();
  }catch(e){console.warn(e);}
}
async function clearAll(){
  if(!confirm('Clear ALL edits, photos and flags from this tool? Your repo and app are not affected.'))return;
  Object.keys(edits).forEach(k=>delete edits[k]);Object.keys(photos).forEach(k=>delete photos[k]);removals.clear();
  try{const d=await db();await new Promise(r=>{const tx=d.transaction(['photos','meta'],'readwrite');tx.objectStore('photos').clear();tx.objectStore('meta').clear();tx.oncomplete=r;});}catch(e){}
  closeEd();renderGrid();
}

renderGrid();
loadSaved();
detectExisting();
</script>
